server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: academic-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/students/**

            - id: payment-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/tuitions/**