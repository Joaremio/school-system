server:
  port: 8082
spring:
  application:
    name: payment-service
  datasource:
    url:  jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: 1234567
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true